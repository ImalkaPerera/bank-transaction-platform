# ======================== Logstash Pipeline Configuration ========================

# The input block defines how Logstash receives data.
input {
  # Accept logs from Filebeat on port 5044
  beats {
    port => 5044
  }
}

# The filter block processes and transforms the incoming logs.
filter {
  # Parse the incoming message as JSON (if it is JSON formatted)
  json {
    source => "message"
  }

  # Try to parse @timestamp field first
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
    remove_field => ["@timestamp"]
  }

  # If @timestamp is missing, try to parse instant.epochSecond (for log lines with 'instant')
  if !["@timestamp"] and [instant][epochSecond] {
    ruby {
      code => "event.set('@timestamp', Time.at(event.get('[instant][epochSecond]').to_i).utc.iso8601)"
    }
  }

  # Convert specific fields to proper data types for accurate querying and aggregation in Kibana
  mutate {
    convert => {
      "status" => "integer"
      "durationMs" => "integer"
    }
  }
}

# The output block defines where to send the processed logs.
output {

  # Only WARN and ERROR logs are indexed in Elasticsearch.
  if [level] in ["WARN", "ERROR"] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "bank-logs-%{+YYYY.MM.dd}" # Create a daily index for warning and error logs
    }
  }

  # Print logs to the Logstash container's console (useful for debugging)
  stdout {
    codec => rubydebug
  }

}