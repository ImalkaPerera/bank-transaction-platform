# ======================== Logstash Pipeline Configuration ========================

# The input block defines how Logstash receives data.
input {
  # Accept logs from Filebeat on port 5044
  beats {
    port => 5044
  }
}

# The filter block processes and transforms the incoming logs.
filter {
  # Parse the incoming message as JSON (if it is JSON formatted)
  json {
    source => "message"
  }

  # Parse the timestamp field to match ISO8601 format and standardize it
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Convert specific fields to proper data types for accurate querying and aggregation in Kibana
  mutate {
    convert => {
      "status" => "integer"
      "durationMs" => "integer"
    }
  }
}

# The output block defines where to send the processed logs.
output {

  # Separate routing: Send ERROR logs to a dedicated error index
  if [level] == "ERROR" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "bank-error-logs-%{+YYYY.MM.dd}" # Create a daily index for errors
    }
  } 
  # All other logs (INFO, WARN, DEBUG, etc.) go to the general log index
  else {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "bank-logs-%{+YYYY.MM.dd}" # Create a daily index for general logs
    }
  }

  # Print logs to the Logstash container's console (useful for debugging)
  stdout {
    codec => rubydebug
  }

}